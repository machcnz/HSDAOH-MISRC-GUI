name: Build and release binary

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release and upload built assets"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag to release when manually dispatched (example: v0.6.0)"
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  BUILD_DIR: build-gha
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight-guard-tests:
    name: Preflight guard tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run CI guard tests
        run: |
          set -eux
          python3 misrc_tools/test/ci_guard_tests.py
  preflight-cross-platform-guards:
    name: Cross-platform guard tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - windows-2022
          - macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run static CI guard tests
        run: |
          python misrc_tools/test/ci_guard_tests.py --static-only
  linux-appimage:
    name: Linux AppImage sanity build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            linuxdeploy_arch: x86_64
            artifact_suffix: x86
          - arch: arm64
            runner: ubuntu-22.04-arm
            linuxdeploy_arch: aarch64
            artifact_suffix: arm64
    runs-on: ${{ matrix.runner }}
    needs:
      - preflight-guard-tests
      - preflight-cross-platform-guards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build version
        id: version
        run: |
          set -eux
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --dirty --match 'v*' --match 'misrc_tools-*' 2>/dev/null || true)"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-${GITHUB_SHA::7}"
            fi
          fi
          case "$VERSION" in
            misrc_tools-*) VERSION="${VERSION#misrc_tools-}" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            curl \
            git \
            imagemagick \
            libasound2-dev \
            libfftw3-dev \
            libflac-dev \
            libgl1-mesa-dev \
            libusb-1.0-0-dev \
            libuvc-dev \
            libsoxr-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            meson \
            nasm \
            ninja-build \
            patchelf \
            pkg-config \
            unzip \
            zip

      - name: Build and install hsdaoh + raylib
        run: |
          set -eux
          DEPS_PREFIX="$PWD/.deps/install"
          HSDAOH_COMMIT="ecd5f835ffad911e7b0b73d905e70cddc898c1ab"
          git clone --depth 1 https://github.com/Stefan-Olt/hsdaoh.git .deps/hsdaoh
          git -C .deps/hsdaoh checkout --detach "$HSDAOH_COMMIT"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git .deps/raylib
          cmake -S .deps/hsdaoh -B .deps/hsdaoh/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DINSTALL_UDEV_RULES=OFF
          cmake --build .deps/hsdaoh/build --parallel
          cmake --install .deps/hsdaoh/build
          for PCDIR in "$DEPS_PREFIX/lib/pkgconfig" "$DEPS_PREFIX/lib64/pkgconfig"; do
            if [[ -f "$PCDIR/libhsdaoh.pc" && ! -f "$PCDIR/hsdaoh.pc" ]]; then
              cp "$PCDIR/libhsdaoh.pc" "$PCDIR/hsdaoh.pc"
            fi
          done

          cmake -S .deps/raylib -B .deps/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_GAMES=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX"
          cmake --build .deps/raylib/build --parallel
          cmake --install .deps/raylib/build

      - name: Build MISRC tools (Meson)
        env:
          MISRC_TOOLS_VERSION_OVERRIDE: ${{ steps.version.outputs.version }}
        run: |
          set -eux
          DEPS_PREFIX="$PWD/.deps/install"
          export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig:$DEPS_PREFIX/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CMAKE_PREFIX_PATH="$DEPS_PREFIX:${CMAKE_PREFIX_PATH:-}"
          meson setup "$BUILD_DIR" misrc_tools --buildtype release
          meson compile -C "$BUILD_DIR" misrc_capture misrc_extract misrc_gui
          test -x "$BUILD_DIR/misrc_gui"

      - name: Smoke test built binaries
        run: |
          set -eux
          "$BUILD_DIR/misrc_gui" --smoke-test
          set +e
          "$BUILD_DIR/misrc_capture" -h > /tmp/misrc_capture_help.txt 2>&1
          RC_CAPTURE=$?
          "$BUILD_DIR/misrc_extract" -h > /tmp/misrc_extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" /tmp/misrc_capture_help.txt
          grep -qi "Usage" /tmp/misrc_extract_help.txt

      - name: Package AppImage artifact
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          LINUXDEPLOY_ARCH: ${{ matrix.linuxdeploy_arch }}
        run: |
          set -eux
          mkdir -p AppDir/usr/bin
          cp "$BUILD_DIR/misrc_gui" AppDir/usr/bin/
          cp "$BUILD_DIR/misrc_capture" AppDir/usr/bin/
          cp "$BUILD_DIR/misrc_extract" AppDir/usr/bin/

          cat > AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          install_shortcuts() {
            local appimage_path="${APPIMAGE:-}"
            if [[ -z "$appimage_path" || ! -f "$appimage_path" ]]; then
              return 0
            fi
            local data_home="${XDG_DATA_HOME:-$HOME/.local/share}"
            local apps_dir="$data_home/applications"
            local icons_dir="$data_home/icons/hicolor/512x512/apps"
            local launcher="$apps_dir/misrc_gui.desktop"
            local local_bin_dir="$HOME/.local/bin"
            local stable_appimage="$local_bin_dir/misrc_gui.AppImage"
            local launcher_exec_path="$appimage_path"

            mkdir -p "$apps_dir" "$icons_dir" "$local_bin_dir"
            if ln -sfn "$appimage_path" "$stable_appimage"; then
              launcher_exec_path="$stable_appimage"
              chmod +x "$stable_appimage" || true
            fi
            local escaped_launcher_exec_path="$launcher_exec_path"
            escaped_launcher_exec_path="${escaped_launcher_exec_path//\\/\\\\}"
            escaped_launcher_exec_path="${escaped_launcher_exec_path//\"/\\\"}"
            local gui_version=""
            local startup_wm_class="misrc_gui"
            if [[ -x "$HERE/usr/bin/misrc_gui" ]]; then
              gui_version="$("$HERE/usr/bin/misrc_gui" --version 2>/dev/null | head -n1 | tr -d '\r')"
              if [[ -n "$gui_version" ]]; then
                startup_wm_class="MISRC Capture $gui_version"
              fi
            fi
            local escaped_startup_wm_class="$startup_wm_class"
            escaped_startup_wm_class="${escaped_startup_wm_class//\\/\\\\}"
            escaped_startup_wm_class="${escaped_startup_wm_class//\"/\\\"}"
            if [[ -f "$HERE/misrc.png" ]]; then
              cp -f "$HERE/misrc.png" "$icons_dir/misrc.png" || true
            fi
            {
              printf '%s\n' \
                "[Desktop Entry]" \
                "Type=Application" \
                "Name=MISRC GUI" \
                "Exec=\"${escaped_launcher_exec_path}\" %U" \
                "Icon=misrc" \
                "Categories=Utility;" \
                "StartupWMClass=${escaped_startup_wm_class}" \
                "X-GNOME-WMClass=${escaped_startup_wm_class}" \
                "Terminal=false" \
                "StartupNotify=true"
            } > "$launcher"
            chmod +x "$launcher" || true

            local desktop_dir=""
            if command -v xdg-user-dir >/dev/null 2>&1; then
              desktop_dir="$(xdg-user-dir DESKTOP 2>/dev/null || true)"
            fi
            if [[ -z "$desktop_dir" ]]; then
              desktop_dir="$HOME/Desktop"
            fi
            if [[ -d "$desktop_dir" ]]; then
              cp -f "$launcher" "$desktop_dir/MISRC GUI.desktop" || true
              chmod +x "$desktop_dir/MISRC GUI.desktop" || true
            fi
          }
          if [[ "${1:-}" == "--create-shortcut" ]]; then
            install_shortcuts
            exit 0
          fi
          if [[ $# -eq 0 ]]; then
            install_shortcuts
            exec "$HERE/usr/bin/misrc_gui"
          fi
          case "$1" in
            capture)
              shift
              exec "$HERE/usr/bin/misrc_capture" "$@"
              ;;
            extract)
              shift
              exec "$HERE/usr/bin/misrc_extract" "$@"
              ;;
            *)
              if [[ "${1:-}" != "--smoke-test" ]]; then
                install_shortcuts
              fi
              exec "$HERE/usr/bin/misrc_gui" "$@"
              ;;
          esac
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/misrc.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=MISRC GUI
          Exec=misrc_gui
          Icon=misrc
          Categories=Utility;
          StartupWMClass=MISRC Capture ${BUILD_VERSION}
          X-GNOME-WMClass=MISRC Capture ${BUILD_VERSION}
          Terminal=false
          StartupNotify=true
          EOF
          ICON_SRC="assets/Icons/MISRC_Icon.png"
          test -f "$ICON_SRC"
          convert "$ICON_SRC" -resize 512x512\! AppDir/misrc.png
          ln -sf misrc.png AppDir/.DirIcon
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp AppDir/misrc.png AppDir/usr/share/icons/hicolor/512x512/apps/misrc.png

          curl -L -o linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage"
          curl -L -o linuxdeploy-plugin-appimage "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-${LINUXDEPLOY_ARCH}.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-appimage

          ARCH="$LINUXDEPLOY_ARCH" APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy \
            --appdir AppDir \
            -e AppDir/usr/bin/misrc_gui \
            -d AppDir/misrc.desktop \
            -i AppDir/misrc.png \
            --output appimage

          APPIMAGE_NAME="linux_MISRC_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.AppImage"
          mv ./*.AppImage "$APPIMAGE_NAME"
          test -f "$APPIMAGE_NAME"

          APPIMAGE_EXTRACT_AND_RUN=1 "./$APPIMAGE_NAME" --smoke-test
          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 "./$APPIMAGE_NAME" capture -h > /tmp/appimage_capture_help.txt 2>&1
          RC_CAPTURE=$?
          APPIMAGE_EXTRACT_AND_RUN=1 "./$APPIMAGE_NAME" extract -h > /tmp/appimage_extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" /tmp/appimage_capture_help.txt
          grep -qi "Usage" /tmp/appimage_extract_help.txt
          ZIP_NAME="linux_MISRC_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.zip"
          zip -j "$ZIP_NAME" "$APPIMAGE_NAME"
          test -f "$ZIP_NAME"
          test "$(unzip -Z1 "$ZIP_NAME" | wc -l)" -eq 1
          test "$(unzip -Z1 "$ZIP_NAME")" = "$APPIMAGE_NAME"
      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v7
        with:
          name: linux-zip-${{ matrix.arch }}
          path: linux_MISRC_*_${{ matrix.artifact_suffix }}.zip
          if-no-files-found: error

  windows-exe:
    name: Windows EXE sanity build
    runs-on: windows-2022
    needs:
      - preflight-guard-tests
      - preflight-cross-platform-guards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-flac
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-libsoxr
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Resolve build version
        id: version
        shell: msys2 {0}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --dirty --match 'v*' --match 'misrc_tools-*' 2>/dev/null || true)"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-${GITHUB_SHA:0:7}"
            fi
          fi
          case "$VERSION" in
            misrc_tools-*) VERSION="${VERSION#misrc_tools-}" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and package EXE
        shell: msys2 {0}
        env:
          MISRC_TOOLS_VERSION_OVERRIDE: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          DEPS_PREFIX="$PWD/.deps/install"
          export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig:$DEPS_PREFIX/lib64/pkgconfig:${MINGW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          git clone --depth 1 https://github.com/libuvc/libuvc.git .deps/libuvc
          sed -i 's/^if (MSVC OR MINGW)$/if (MSVC)/' .deps/libuvc/cmake/FindLibUSB.cmake
          cmake -S .deps/libuvc -B .deps/libuvc/build -G Ninja \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLE=OFF \
            -DBUILD_TEST=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX"
          cmake --build .deps/libuvc/build --parallel
          cmake --install .deps/libuvc/build

          HSDAOH_COMMIT="ecd5f835ffad911e7b0b73d905e70cddc898c1ab"
          git clone --depth 1 https://github.com/Stefan-Olt/hsdaoh.git .deps/hsdaoh
          git -C .deps/hsdaoh checkout --detach "$HSDAOH_COMMIT"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git .deps/raylib
          cmake -S .deps/hsdaoh -B .deps/hsdaoh/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DINSTALL_UDEV_RULES=OFF
          cmake --build .deps/hsdaoh/build --target hsdaoh_static --parallel
          mkdir -p "$DEPS_PREFIX/include" "$DEPS_PREFIX/lib" "$DEPS_PREFIX/lib/pkgconfig"
          cp .deps/hsdaoh/include/hsdaoh.h "$DEPS_PREFIX/include/"
          cp .deps/hsdaoh/include/hsdaoh_export.h "$DEPS_PREFIX/include/"
          cp .deps/hsdaoh/include/hsdaoh_raw.h "$DEPS_PREFIX/include/"
          cp .deps/hsdaoh/include/hsdaoh_crc.h "$DEPS_PREFIX/include/"
          if [[ -f .deps/hsdaoh/build/src/libhsdaoh.a ]]; then
            cp .deps/hsdaoh/build/src/libhsdaoh.a "$DEPS_PREFIX/lib/libhsdaoh.a"
          elif [[ -f .deps/hsdaoh/build/src/libhsdaoh_static.a ]]; then
            cp .deps/hsdaoh/build/src/libhsdaoh_static.a "$DEPS_PREFIX/lib/libhsdaoh.a"
          elif [[ -f .deps/hsdaoh/build/src/hsdaoh_static.lib ]]; then
            cp .deps/hsdaoh/build/src/hsdaoh_static.lib "$DEPS_PREFIX/lib/libhsdaoh.a"
          else
            echo "hsdaoh static library not found in expected build output paths" >&2
            exit 1
          fi
          cp .deps/hsdaoh/build/libhsdaoh.pc "$DEPS_PREFIX/lib/pkgconfig/libhsdaoh.pc"
          sed -i 's/^Libs: .*/Libs: -L${libdir} -lhsdaoh -luvc -lusb-1.0/' "$DEPS_PREFIX/lib/pkgconfig/libhsdaoh.pc"
          for PCDIR in "$DEPS_PREFIX/lib/pkgconfig" "$DEPS_PREFIX/lib64/pkgconfig"; do
            if [[ -f "$PCDIR/libhsdaoh.pc" && ! -f "$PCDIR/hsdaoh.pc" ]]; then
              cp "$PCDIR/libhsdaoh.pc" "$PCDIR/hsdaoh.pc"
            fi
          done
          cmake -S .deps/raylib -B .deps/raylib/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_GAMES=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX"
          cmake --build .deps/raylib/build --parallel
          cmake --install .deps/raylib/build

          export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig:$DEPS_PREFIX/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CMAKE_PREFIX_PATH="$DEPS_PREFIX:${CMAKE_PREFIX_PATH:-}"
          meson setup "$BUILD_DIR" misrc_tools --buildtype release
          meson compile -C "$BUILD_DIR" misrc_capture misrc_extract misrc_gui

          mkdir -p dist
          cp "$BUILD_DIR/misrc_gui.exe" dist/MISRC.exe
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -name '*.exe' | wc -l)" -eq 1
          test "$(objdump -p dist/MISRC.exe | awk '/^Subsystem[[:space:]]/ {print $2; exit}')" = "00000002"
          assert_no_nonsystem_dlls() {
            local target="$1"
            while IFS= read -r dll; do
              case "$(echo "$dll" | tr '[:lower:]' '[:upper:]')" in
                API-MS-WIN-*|KERNEL32.DLL|KERNELBASE.DLL|USER32.DLL|GDI32.DLL|SHELL32.DLL|WINMM.DLL|OLE32.DLL|OLEAUT32.DLL|ADVAPI32.DLL|COMDLG32.DLL|COMCTL32.DLL|SHLWAPI.DLL|WS2_32.DLL|SETUPAPI.DLL|IMM32.DLL|VERSION.DLL|UCRTBASE.DLL|MSVCRT.DLL|MF.DLL|MFPLAT.DLL|MFREADWRITE.DLL|EVR.DLL|STRMIIDS.DLL|AVRT.DLL)
                  continue
                  ;;
                *)
                  echo "Non-system runtime DLL dependency detected in $target: $dll" >&2
                  exit 1
                  ;;
              esac
            done < <(objdump -p "$target" | awk '/DLL Name:/ {print $3}')
          }

          assert_no_nonsystem_dlls "dist/MISRC.exe"
          ./dist/MISRC.exe --smoke-test
          set +e
          "$BUILD_DIR/misrc_capture.exe" -h > capture_help.txt 2>&1
          RC_CAPTURE=$?
          "$BUILD_DIR/misrc_extract.exe" -h > extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" capture_help.txt
          grep -qi "Usage" extract_help.txt

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          $ZipPath = "windows_MISRC_${{ steps.version.outputs.version }}_x86.zip"
          Compress-Archive -Path @("dist/MISRC.exe") -DestinationPath $ZipPath -Force
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $ZipPath))
          try {
            if ($zip.Entries.Count -ne 1) {
              throw "Expected 1 entry in $ZipPath, found $($zip.Entries.Count)"
            }
            foreach ($entry in $zip.Entries) {
              if ($entry.FullName.Contains('/') -or $entry.FullName.Contains('\')) {
                throw "ZIP entry is nested; expected flat layout: $($entry.FullName)"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: windows_MISRC_*_x86.zip
          if-no-files-found: error

  macos-app-build:
    name: macOS APP build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    needs:
      - preflight-guard-tests
      - preflight-cross-platform-guards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build version
        id: version
        run: |
          set -eux
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --dirty --match 'v*' --match 'misrc_tools-*' 2>/dev/null || true)"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-${GITHUB_SHA::7}"
            fi
          fi
          case "$VERSION" in
            misrc_tools-*) VERSION="${VERSION#misrc_tools-}" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          set -eux
          brew update
          for formula in cmake fftw flac libusb libuvc meson nasm ninja pkgconf libsoxr; do
            if ! brew list --versions "$formula" >/dev/null 2>&1; then
              brew install "$formula"
            fi
          done

      - name: Build and stage architecture app bundle
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          MACOS_ARCH: ${{ matrix.arch }}
          MISRC_TOOLS_VERSION_OVERRIDE: ${{ steps.version.outputs.version }}
        run: |
          set -eux
          DEPS_PREFIX="$PWD/.deps/install"
          FLAC_PREFIX="$(brew --prefix flac)"
          BREW_PREFIX="$(brew --prefix)"
          export CPPFLAGS="-I${BREW_PREFIX}/include ${CPPFLAGS:-}"
          export CFLAGS="-arch ${MACOS_ARCH} ${CFLAGS:-}"
          export CXXFLAGS="-arch ${MACOS_ARCH} ${CXXFLAGS:-}"
          export LDFLAGS="-arch ${MACOS_ARCH} ${LDFLAGS:-}"

          HSDAOH_COMMIT="ecd5f835ffad911e7b0b73d905e70cddc898c1ab"
          git clone --depth 1 https://github.com/Stefan-Olt/hsdaoh.git .deps/hsdaoh
          git -C .deps/hsdaoh checkout --detach "$HSDAOH_COMMIT"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git .deps/raylib
          cmake -S .deps/hsdaoh -B .deps/hsdaoh/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-I${FLAC_PREFIX}/include -I${BREW_PREFIX}/include" \
            -DCMAKE_OSX_ARCHITECTURES="${MACOS_ARCH}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DINSTALL_UDEV_RULES=OFF
          cmake --build .deps/hsdaoh/build --parallel
          cmake --install .deps/hsdaoh/build
          for PCDIR in "$DEPS_PREFIX/lib/pkgconfig" "$DEPS_PREFIX/lib64/pkgconfig"; do
            if [[ -f "$PCDIR/libhsdaoh.pc" && ! -f "$PCDIR/hsdaoh.pc" ]]; then
              cp "$PCDIR/libhsdaoh.pc" "$PCDIR/hsdaoh.pc"
            fi
          done
          cmake -S .deps/raylib -B .deps/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${MACOS_ARCH}" \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_GAMES=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX"
          cmake --build .deps/raylib/build --parallel
          cmake --install .deps/raylib/build

          export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig:$DEPS_PREFIX/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CMAKE_PREFIX_PATH="$DEPS_PREFIX:${CMAKE_PREFIX_PATH:-}"
          meson setup "$BUILD_DIR" misrc_tools --buildtype release
          meson compile -C "$BUILD_DIR" misrc_capture misrc_extract misrc_gui

          "$BUILD_DIR/misrc_gui" --smoke-test
          set +e
          "$BUILD_DIR/misrc_capture" -h > /tmp/macos_capture_help.txt 2>&1
          RC_CAPTURE=$?
          "$BUILD_DIR/misrc_extract" -h > /tmp/macos_extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" /tmp/macos_capture_help.txt
          grep -qi "Usage" /tmp/macos_extract_help.txt

          APP_ROOT="dist/MISRC.app/Contents"
          FW_DIR="$APP_ROOT/Frameworks"
          mkdir -p "$APP_ROOT/MacOS" "$APP_ROOT/Resources" "$FW_DIR"
          ICON_SRC="assets/Icons/MISRC_Icon.png"
          test -f "$ICON_SRC"
          ICONSET_DIR="dist/MISRC.iconset"
          mkdir -p "$ICONSET_DIR"
          sips -z 16 16 "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32 "$ICON_SRC" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32 "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64 "$ICON_SRC" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128 "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256 "$ICON_SRC" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256 "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256.png"
          sips -z 512 512 "$ICON_SRC" --out "$ICONSET_DIR/icon_256x256@2x.png"
          sips -z 512 512 "$ICON_SRC" --out "$ICONSET_DIR/icon_512x512.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o "$APP_ROOT/Resources/MISRC.icns"
          rm -rf "$ICONSET_DIR"
          cp "$BUILD_DIR/misrc_gui" "$APP_ROOT/MacOS/MISRC"
          cp "$BUILD_DIR/misrc_capture" "$APP_ROOT/MacOS/misrc_capture"
          cp "$BUILD_DIR/misrc_extract" "$APP_ROOT/MacOS/misrc_extract"
          chmod +x "$APP_ROOT/MacOS/MISRC" "$APP_ROOT/MacOS/misrc_capture" "$APP_ROOT/MacOS/misrc_extract"

          cat > "$APP_ROOT/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MISRC</string>
            <key>CFBundleDisplayName</key>
            <string>MISRC</string>
            <key>CFBundleIdentifier</key>
            <string>dev.misrc.gui</string>
            <key>CFBundleVersion</key>
            <string>__BUILD_VERSION__</string>
            <key>CFBundleShortVersionString</key>
            <string>__BUILD_VERSION__</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>MISRC</string>
            <key>CFBundleIconFile</key>
            <string>MISRC</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
          </dict>
          </plist>
          EOF
          sed -i '' "s/__BUILD_VERSION__/${BUILD_VERSION}/g" "$APP_ROOT/Info.plist"


          shopt -s nullglob
          is_system_lib() {
            case "$1" in
              /System/*|/usr/lib/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          resolve_dep_path() {
            local dep="$1"
            if [[ "$dep" == @rpath/* ]]; then
              local name="${dep#@rpath/}"
              local candidates=(
                "$DEPS_PREFIX/lib/$name"
                "$DEPS_PREFIX/lib64/$name"
                "$BREW_PREFIX/lib/$name"
                $BREW_PREFIX/opt/*/lib/"$name"
              )
              local candidate
              for candidate in "${candidates[@]}"; do
                if [[ -f "$candidate" ]]; then
                  printf '%s\n' "$candidate"
                  return 0
                fi
              done
              return 1
            fi
            printf '%s\n' "$dep"
          }

          collect_dep_tree() {
            local dep="$1"
            if is_system_lib "$dep"; then
              return 0
            fi
            local resolved
            resolved="$(resolve_dep_path "$dep")" || {
              echo "Unable to resolve dylib dependency: $dep" >&2
              return 1
            }
            local base
            base="$(basename "$resolved")"
            if [[ ! -f "$FW_DIR/$base" ]]; then
              cp "$resolved" "$FW_DIR/$base"
              chmod +w "$FW_DIR/$base"
              install_name_tool -id "@rpath/$base" "$FW_DIR/$base"
              while IFS= read -r subdep; do
                collect_dep_tree "$subdep"
              done < <(otool -L "$FW_DIR/$base" | tail -n +2 | awk '{print $1}')
            fi
          }

          patch_macho_refs() {
            local target="$1"
            chmod +w "$target" || true
            while IFS= read -r dep; do
              if is_system_lib "$dep"; then
                continue
              fi
              local base
              if [[ "$dep" == @rpath/* ]]; then
                base="$(basename "${dep#@rpath/}")"
              else
                base="$(basename "$dep")"
              fi
              if [[ -f "$FW_DIR/$base" ]]; then
                install_name_tool -change "$dep" "@rpath/$base" "$target" || true
              fi
            done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')
          }

          for BIN in "$APP_ROOT/MacOS/MISRC" "$APP_ROOT/MacOS/misrc_capture" "$APP_ROOT/MacOS/misrc_extract"; do
            while IFS= read -r dep; do
              collect_dep_tree "$dep"
            done < <(otool -L "$BIN" | tail -n +2 | awk '{print $1}')
          done

          for BIN in "$APP_ROOT/MacOS/MISRC" "$APP_ROOT/MacOS/misrc_capture" "$APP_ROOT/MacOS/misrc_extract"; do
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$BIN" 2>/dev/null || true
            patch_macho_refs "$BIN"
          done
          for DYLIB in "$FW_DIR"/*.dylib; do
            patch_macho_refs "$DYLIB"
          done

          if otool -L "$APP_ROOT/MacOS/MISRC" | grep -E '/opt/homebrew|/usr/local/opt'; then
            echo "Found non-portable Homebrew dylib path in MISRC binary" >&2
            exit 1
          fi
          if otool -L "$APP_ROOT/MacOS/misrc_capture" | grep -E '/opt/homebrew|/usr/local/opt'; then
            echo "Found non-portable Homebrew dylib path in misrc_capture binary" >&2
            exit 1
          fi

          "$APP_ROOT/MacOS/MISRC" --smoke-test
          set +e
          "$APP_ROOT/MacOS/misrc_capture" -h > /tmp/macos_bundle_capture_help.txt 2>&1
          RC_CAPTURE=$?
          "$APP_ROOT/MacOS/misrc_extract" -h > /tmp/macos_bundle_extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" /tmp/macos_bundle_capture_help.txt
          grep -qi "Usage" /tmp/macos_bundle_extract_help.txt

          codesign --force --deep --sign - dist/MISRC.app
          echo "$BUILD_VERSION" > dist/BUILD_VERSION.txt

      - name: Upload macOS architecture stage
        uses: actions/upload-artifact@v7
        with:
          name: macos-app-stage-${{ matrix.arch }}
          path: |
            dist/MISRC.app
            dist/BUILD_VERSION.txt
          if-no-files-found: error

  macos-app-universal:
    name: macOS APP sanity build (universal)
    runs-on: macos-14
    needs:
      - macos-app-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download arm64 stage
        uses: actions/download-artifact@v8
        with:
          name: macos-app-stage-arm64
          path: stage-arm64

      - name: Download x86_64 stage
        uses: actions/download-artifact@v8
        with:
          name: macos-app-stage-x86_64
          path: stage-x86_64

      - name: Merge universal app and package DMG
        id: package
        run: |
          set -eux
          BUILD_VERSION="$(cat stage-arm64/BUILD_VERSION.txt)"
          echo "version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"

          mkdir -p dist
          cp -R stage-arm64/MISRC.app dist/MISRC.app

          while IFS= read -r rel; do
            ARM_FILE="stage-arm64/${rel}"
            X86_FILE="stage-x86_64/${rel}"
            OUT_FILE="dist/${rel}"
            if file "$ARM_FILE" | grep -q "Mach-O"; then
              lipo -create "$ARM_FILE" "$X86_FILE" -output "$OUT_FILE"
            else
              cp "$ARM_FILE" "$OUT_FILE"
            fi
          done < <(cd stage-arm64 && find MISRC.app -type f | sort)
          chmod +x dist/MISRC.app/Contents/MacOS/MISRC dist/MISRC.app/Contents/MacOS/misrc_capture dist/MISRC.app/Contents/MacOS/misrc_extract

          codesign --force --deep --sign - dist/MISRC.app

          LIPO_ARCHS="$(lipo -archs dist/MISRC.app/Contents/MacOS/MISRC)"
          echo "$LIPO_ARCHS" | grep -q 'arm64'
          echo "$LIPO_ARCHS" | grep -q 'x86_64'

          dist/MISRC.app/Contents/MacOS/MISRC --smoke-test
          set +e
          dist/MISRC.app/Contents/MacOS/misrc_capture -h > /tmp/macos_universal_capture_help.txt 2>&1
          RC_CAPTURE=$?
          dist/MISRC.app/Contents/MacOS/misrc_extract -h > /tmp/macos_universal_extract_help.txt 2>&1
          RC_EXTRACT=$?
          set -e
          test "$RC_CAPTURE" -eq 1
          test "$RC_EXTRACT" -eq 1
          grep -qi "Usage" /tmp/macos_universal_capture_help.txt
          grep -qi "Usage" /tmp/macos_universal_extract_help.txt
          DMG_STAGE_DIR="dmg-stage"
          rm -rf "$DMG_STAGE_DIR"
          mkdir -p "$DMG_STAGE_DIR"
          cp -R dist/MISRC.app "$DMG_STAGE_DIR/MISRC.app"
          ln -s /Applications "$DMG_STAGE_DIR/Applications"
          DMG_NAME="macos_MISRC_${BUILD_VERSION}_universal.dmg"
          hdiutil create \
            -volname "MISRC" \
            -srcfolder "$DMG_STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          test -f "$DMG_NAME"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: macos_MISRC_*_universal.dmg
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-24.04
    needs:
      - linux-appimage
      - windows-exe
      - macos-app-universal
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        run: |
          set -eux
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              echo "release_tag is required when create_release=true" >&2
              exit 1
            fi
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$TAG" "$GITHUB_SHA"
              git push origin "$TAG"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**/linux_MISRC_*_x86.zip
            release-assets/**/linux_MISRC_*_arm64.zip
            release-assets/**/windows_MISRC_*_x86.zip
            release-assets/**/macos_MISRC_*_universal.dmg

            

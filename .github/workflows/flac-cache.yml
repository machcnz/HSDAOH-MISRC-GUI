name: Rebuild libFLAC CI cache

# One-off maintenance workflow that builds a prebuilt static libFLAC 1.5.0 for a
# given arch and uploads it to the harrypm/MISRC-ci-cache release
# (tag flac-1.5.0-linux) so the Linux AppImage jobs in build.yml can fetch it
# instead of building from source. Run manually from the Actions tab.
#
# Requires the CI_CACHE_PAT repo secret in harrypm/MISRC: a fine-grained PAT
# with Contents: read+write on harrypm/MISRC-ci-cache. Without it the upload
# step fails with a clear message; the build/package steps still validate the
# toolchain.

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build and upload"
        required: true
        type: choice
        default: arm64
        options:
          - arm64
          - x86_64
      flac_version:
        description: "FLAC version (must match build.yml FLAC_VERSION)"
        required: false
        type: string
        default: "1.5.0"

permissions:
  contents: read

env:
  CACHE_REPO: harrypm/MISRC-ci-cache
  FLAC_SRC_SHA256: f2c1c76592a82ffff8413ba3c4a1299b6c7ab06c734dee03fd88630485c2b920

jobs:
  build-and-upload:
    name: Build + upload prebuilt libFLAC (${{ inputs.arch }})
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config curl xz-utils

      - name: Build + package prebuilt libFLAC
        id: pkg
        run: |
          set -eux
          FLAC_VERSION="${{ inputs.flac_version }}"
          ARCH="${{ inputs.arch }}"
          CACHE_TAG="flac-${FLAC_VERSION}-linux"
          SRC_TARBALL="/tmp/flac-${FLAC_VERSION}.tar.xz"

          # Pull the upstream source tarball from the cache release (it ships the
          # source alongside the prebuilt libs) and verify it against the pinned
          # upstream sha256 so a tampered/rotated source cannot silently produce a
          # bad prebuilt that we then upload.
          curl -fsSL -o "${SRC_TARBALL}" \
            "https://github.com/${CACHE_REPO}/releases/download/${CACHE_TAG}/flac-${FLAC_VERSION}.tar.xz"
          echo "${FLAC_SRC_SHA256}  ${SRC_TARBALL}" | sha256sum -c -

          STAGING="$PWD/staging"
          rm -rf staging build src
          mkdir -p src
          tar -xf "${SRC_TARBALL}" -C src --strip-components=1
          cmake -S src -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWITH_OGG=OFF \
            -DBUILD_TESTING=OFF \
            -DCMAKE_INSTALL_PREFIX="${STAGING}"
          cmake --build build --parallel
          cmake --install build

          # Repackage lean + relocatable flac.pc (mirrors the layout produced by
          # the local build script that seeded the x86_64 asset).
          rm -rf lean
          mkdir -p lean/lib/pkgconfig lean/include/FLAC
          cp "${STAGING}/lib/libFLAC.a" lean/lib/
          cp "${STAGING}"/include/FLAC/*.h lean/include/FLAC/
          cat > lean/lib/pkgconfig/flac.pc <<'EOF'
          prefix=${pcfiledir}/../..
          exec_prefix=${prefix}
          libdir=${prefix}/lib
          includedir=${prefix}/include

          Name: FLAC
          Description: Free Lossless Audio Codec Library
          Version: 1.5.0
          Requires.private:
          Libs: -L${libdir} -lFLAC
          Libs.private: -lm
          Cflags: -I${includedir}
          EOF

          # Self-check: the relocatable flac.pc must resolve to 1.5.0 from the
          # lean tree before we ship it.
          PKG_CONFIG_PATH="$PWD/lean/lib/pkgconfig" pkg-config --modversion flac | grep -qx "1.5.0"

          PKG="flac-${FLAC_VERSION}-prebuilt-linux-${ARCH}.tar.xz"
          tar -C lean --owner=0 --group=0 --numeric-owner \
            --transform "s,^,flac-${FLAC_VERSION}-prebuilt/," \
            -cJf "${PKG}" .
          sha256sum "${PKG}" > "${PKG}.sha256"
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"
          echo "pkg_size=$(stat -c %s "${PKG}")" >> "$GITHUB_OUTPUT"

      - name: Upload to MISRC-ci-cache release
        env:
          GH_TOKEN: ${{ secrets.CI_CACHE_PAT }}
        run: |
          set -eux
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "secrets.CI_CACHE_PAT is not set." >&2
            echo "Create a fine-grained PAT with Contents: read+write on harrypm/MISRC-ci-cache and add it as the CI_CACHE_PAT secret in harrypm/MISRC, then re-run this workflow." >&2
            exit 1
          fi
          FLAC_VERSION="${{ inputs.flac_version }}"
          ARCH="${{ inputs.arch }}"
          CACHE_TAG="flac-${FLAC_VERSION}-linux"
          PKG="${{ steps.pkg.outputs.pkg }}"
          gh release upload "${CACHE_TAG}" \
            --repo harrypm/MISRC-ci-cache \
            --clobber \
            "${PKG}" "${PKG}.sha256"
          echo "Uploaded ${PKG} (${{ steps.pkg.outputs.pkg_size }} bytes) to ${CACHE_REPO}@${CACHE_TAG}"
